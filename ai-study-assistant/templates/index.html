<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{
--bg:#ffffff;
--card:#ffffff;
--text:#111111;
--muted:#666;
--border:#e5e7eb;
--accent:#111111;
}

.dark{
--bg:#0a0a0a;
--card:#111111;
--text:#ffffff;
--muted:#a1a1aa;
--border:#27272a;
--accent:#ffffff;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
background:var(--bg);
color:var(--text);
font-family:Inter,Arial,sans-serif;
transition:.25s;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:24px;
padding:30px;
}

h1{font-size:40px;margin-bottom:8px}

.subtitle{
color:var(--muted);
margin-bottom:24px;
}

textarea{
width:100%;
height:180px;
resize:none;
padding:18px;
border-radius:18px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
font-size:16px;
}

.buttons{
display:flex;
gap:12px;
margin-top:16px;
}

button{
padding:12px 20px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:600;
}

.ask{
background:var(--accent);
color:var(--bg);
}

.theme,.clear{
background:transparent;
border:1px solid var(--border);
color:var(--text);
}

.chips{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.chip{
padding:10px 16px;
border:1px solid var(--border);
border-radius:999px;
cursor:pointer;
}

.answer{
margin-top:24px;
padding:24px;
border:1px solid var(--border);
border-radius:18px;
}

.answer h1,.answer h2,.answer h3{margin-bottom:12px}
.answer ul{padding-left:20px}

.copy{
margin-top:16px;
background:var(--accent);
color:var(--bg);
}

.loader{
display:none;
margin-top:16px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>EduAI</h1>
<p class="subtitle">Personalized AI Study Assistant</p>

<form method="POST" onsubmit="showLoader()">

<textarea
name="question"
id="question"
placeholder="Ask anything..."
required></textarea>

<div class="buttons">
<button class="ask">Ask AI</button>
<button type="button" class="theme" onclick="toggleTheme()">Theme</button>
<button type="button" class="clear" onclick="clearBox()">Clear</button>
</div>

<div id="loader" class="loader">Generating response...</div>

</form>

<div class="chips">
<div class="chip" onclick="fill(this)">Concepts</div>
<div class="chip" onclick="fill(this)">Summarize</div>
<div class="chip" onclick="fill(this)">Quiz Me</div>
<div class="chip" onclick="fill(this)">Explain Simply</div>
<div class="chip" onclick="fill(this)">Exam Notes</div>
</div>

{% if answer %}

<script type="text/plain" id="raw-answer">{{answer}}</script>

<div class="answer">
<div id="output"></div>
<button class="copy" onclick="copyAnswer()">Copy</button>
</div>

<script>
document.getElementById("output").innerHTML =
marked.parse(document.getElementById("raw-answer").textContent);
</script>

{% endif %}

</div>
</div>

<script>
if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

function toggleTheme(){
document.body.classList.toggle("dark");
localStorage.setItem(
"theme",
document.body.classList.contains("dark") ? "dark" : "light"
);
}

function fill(el){
document.getElementById("question").value = el.innerText;
}

function clearBox(){
document.getElementById("question").value="";
}

function copyAnswer(){
navigator.clipboard.writeText(
document.getElementById("output").innerText
);
}

function showLoader(){
document.getElementById("loader").style.display="block";
}
</script>

</body>
</html>
